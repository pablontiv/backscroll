name: Continuous Integration

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-lint:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rustfmt Check
        run: cargo fmt --all -- --check
      - name: Clippy Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo Check
        run: cargo check --all

  test:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run Tests
        run: cargo test --all-features

  audit:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Supply Chain Audit
        run: cargo deny check licenses bans

  auto-tag:
    name: Auto Tag
    needs: [check-lint, test, audit]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag untagged commits
        id: tag
        run: |
          set -e
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --reverse HEAD)
            LAST_TAG="v0.1.0"
          else
            COMMITS=$(git rev-list --reverse "${LAST_TAG}..HEAD")
          fi

          LATEST_TAG=""
          for COMMIT in $COMMITS; do
            EXISTING=$(git tag --points-at "$COMMIT" 2>/dev/null | head -1)
            if [ -n "$EXISTING" ]; then
              LAST_TAG="$EXISTING"
              continue
            fi

            MSG=$(git log -1 --format=%s "$COMMIT")
            BUMP=""
            case "$MSG" in
              feat\!*|fix\!*|refactor\!*|perf\!*)  BUMP="breaking" ;;
              feat*)                                 BUMP="feat" ;;
              fix*|perf*)                            BUMP="fix" ;;
            esac
            [ -z "$BUMP" ] && continue

            MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

            if [ "$MAJOR" -eq 0 ]; then
              case "$BUMP" in
                breaking)  MINOR=$((MINOR + 1)); PATCH=0 ;;
                *)         PATCH=$((PATCH + 1)) ;;
              esac
            else
              case "$BUMP" in
                breaking)  MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                feat)      MINOR=$((MINOR + 1)); PATCH=0 ;;
                *)         PATCH=$((PATCH + 1)) ;;
              esac
            fi

            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
            LAST_TAG="$NEXT"
            LATEST_TAG="$NEXT"
          done

          if [ -n "$LATEST_TAG" ]; then
            echo "Tagging HEAD as $LATEST_TAG"
            git tag "$LATEST_TAG" HEAD
            git push origin "$LATEST_TAG"
          fi

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build Release
        run: cargo build --release
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/backscroll
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
