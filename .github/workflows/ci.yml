name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Rustfmt Check
        run: cargo fmt --all -- --check
      - name: Clippy Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo Check
        run: cargo check --all

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - name: Run Tests
        run: cargo test --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Supply Chain Audit
        run: cargo deny check licenses bans advisories

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  install-scripts:
    name: Install Script Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: ShellCheck install.sh
        run: shellcheck install.sh
      - name: Run install.sh unit tests
        run: bash tests/test-install.sh

  install-scripts-windows:
    name: Install Script Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Run Pester tests for install.ps1
        shell: pwsh
        run: |
          Invoke-Pester -Path tests/test-install.ps1 -CI

  release:
    name: Auto Release
    needs: [check-lint, test, audit, gitleaks, install-scripts, install-scripts-windows]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      bump: ${{ steps.version.outputs.bump }}
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --reverse HEAD)
            LAST_TAG="v0.1.0"
          else
            COMMITS=$(git rev-list --reverse "${LAST_TAG}..HEAD")
          fi

          BUMP=""
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --format=%s "$COMMIT")
            case "$MSG" in
              feat\!*|fix\!*|refactor\!*|perf\!*) BUMP="breaking"; break ;;
              feat*) BUMP="feat" ;;
              fix*|perf*) [ -z "$BUMP" ] && BUMP="fix" ;;
            esac
          done

          if [ -z "$BUMP" ]; then
            echo "No version bump required."
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          if [ "$MAJOR" -eq 0 ]; then
            case "$BUMP" in
              breaking) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)        PATCH=$((PATCH + 1)) ;;
            esac
          else
            case "$BUMP" in
              breaking) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              feat)     MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)        PATCH=$((PATCH + 1)) ;;
            esac
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"

          # Guard: skip if tag was already created by a concurrent run
          if git ls-remote --tags origin "refs/tags/$NEXT_TAG" | grep -q .; then
            echo "Tag $NEXT_TAG already exists (concurrent release). Skipping."
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Next tag determined: $NEXT_TAG"
          echo "bump=true" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: Install stable toolchain
        if: steps.version.outputs.bump == 'true'
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Install build tools
        if: steps.version.outputs.bump == 'true'
        run: |
          cargo install cargo-auditable cargo-zigbuild git-cliff
          pip3 install ziglang

      - name: Build Release Binary (native)
        if: steps.version.outputs.bump == 'true'
        run: cargo auditable build --release

      - name: Build Linux musl Static Binary
        if: steps.version.outputs.bump == 'true'
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/backscroll backscroll-linux-x86_64

      - name: Smoke Test Linux Binary
        if: steps.version.outputs.bump == 'true'
        run: |
          ./backscroll-linux-x86_64 --version
          ./backscroll-linux-x86_64 sync --help

      - name: Attest Build Provenance
        if: steps.version.outputs.bump == 'true'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: |
            target/release/backscroll
            backscroll-linux-x86_64

      - name: Generate Changelog
        if: steps.version.outputs.bump == 'true'
        run: git-cliff --latest --strip header --output RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.version.outputs.bump == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            target/release/backscroll \
            backscroll-linux-x86_64 \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md

  release-macos:
    name: macOS aarch64 Binary
    needs: [release]
    if: needs.release.outputs.bump == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Build macOS aarch64 Binary
        run: |
          cargo build --release
          cp target/release/backscroll backscroll-macos-aarch64

      - name: Smoke Test macOS Binary
        run: |
          ./backscroll-macos-aarch64 --version
          ./backscroll-macos-aarch64 sync --help

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: backscroll-macos-aarch64

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag }} \
            backscroll-macos-aarch64

  release-windows:
    name: Windows x86_64 Binary
    needs: [release]
    if: needs.release.outputs.bump == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Build Windows Binary
        run: |
          cargo build --release
          Copy-Item target\release\backscroll.exe backscroll-windows-x86_64.exe

      - name: Smoke Test Windows Binary
        run: |
          .\backscroll-windows-x86_64.exe --version
          .\backscroll-windows-x86_64.exe sync --help

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: backscroll-windows-x86_64.exe

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag }} `
            backscroll-windows-x86_64.exe
