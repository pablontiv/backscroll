name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          components: rustfmt, clippy
      - name: Rustfmt Check
        run: cargo fmt --all -- --check
      - name: Clippy Lint
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Cargo Check
        run: cargo check --all

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      - name: Run Tests
        run: cargo test --all-features

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Supply Chain Audit
        run: cargo deny check licenses bans advisories

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Auto Release
    needs: [check-lint, test, audit, gitleaks]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --reverse HEAD)
            LAST_TAG="v0.1.0"
          else
            COMMITS=$(git rev-list --reverse "${LAST_TAG}..HEAD")
          fi

          BUMP=""
          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --format=%s "$COMMIT")
            case "$MSG" in
              feat\!*|fix\!*|refactor\!*|perf\!*) BUMP="breaking"; break ;;
              feat*) BUMP="feat" ;;
              fix*|perf*) [ -z "$BUMP" ] && BUMP="fix" ;;
            esac
          done

          if [ -z "$BUMP" ]; then
            echo "No version bump required."
            echo "bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          if [ "$MAJOR" -eq 0 ]; then
            case "$BUMP" in
              breaking) MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)        PATCH=$((PATCH + 1)) ;;
            esac
          else
            case "$BUMP" in
              breaking) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              feat)     MINOR=$((MINOR + 1)); PATCH=0 ;;
              *)        PATCH=$((PATCH + 1)) ;;
            esac
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag determined: $NEXT_TAG"
          echo "bump=true" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT

      - name: Install stable toolchain
        if: steps.version.outputs.bump == 'true'
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable

      - name: Install cargo-auditable
        if: steps.version.outputs.bump == 'true'
        run: cargo install cargo-auditable

      - name: Build Release Binary
        if: steps.version.outputs.bump == 'true'
        run: cargo auditable build --release

      - name: Attest Build Provenance
        if: steps.version.outputs.bump == 'true'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: target/release/backscroll

      - name: Generate Changelog
        if: steps.version.outputs.bump == 'true'
        run: |
          cargo install git-cliff
          git-cliff --latest --strip header --output RELEASE_NOTES.md

      - name: Create GitHub Release
        if: steps.version.outputs.bump == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            target/release/backscroll \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md
