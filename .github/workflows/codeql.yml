name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  codeql:
    uses: pablontiv/crossbeam/.github/workflows/codeql.yml@v1
    with:
      language: rust
    permissions:
      security-events: write
      contents: read
