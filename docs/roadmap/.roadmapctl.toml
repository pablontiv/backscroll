done_statuses = ['Completed', 'Obsolete']
active_statuses = ['Pending', 'Specified', 'In Progress']
leaf_filter = 'isIndex == false'
outcome_close_verify = []
loop_max_tasks = 0
parallel = true
autonomy = 'until_done'
compact_after_task_commit = true

[status_values]
pending = 'Pending'
specified = 'Specified'
in_progress = 'In Progress'
completed = 'Completed'
blocked = 'Blocked'
obsolete = 'Obsolete'

[gitflow]
branch_style = 'push directly to main; no feature branches'
pr_title_style = 'conventional commits: <type>(<scope>): <subject> where scope is OXX or direct'
pr_body_style = 'not used (pr_mode = false); commits are squash-merged via direct push'
commit_style = 'conventional'
auto_push = true
pr_mode = false
