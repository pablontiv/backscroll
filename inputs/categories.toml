version = 2

# Navigation
[[rule]]
tool = "Bash"
pattern = "^Bash (cd)"
category = "NAV"

# Search/grep
[[rule]]
tool = "Bash"
pattern = "^Bash (rg|grep|fd|find)"
category = "SEARCH"

# File inspect
[[rule]]
tool = "Bash"
pattern = "^Bash (eza|ls|bat|cat|wc|head|tail)"
category = "FILE_INSPECT"

# Text transform
[[rule]]
tool = "Bash"
pattern = "^Bash (sd|sed|awk|jq)"
category = "TEXT_TRANSFORM"

# Database
[[rule]]
tool = "Bash"
pattern = "^Bash sqlite3"
category = "DB"

# Review tool
[[rule]]
tool = "Bash"
pattern = "^Bash gentle-ai"
category = "REVIEW_TOOL"

# Task runner
[[rule]]
tool = "Bash"
pattern = "^Bash just"
category = "TASK_RUNNER"

# Shell state
[[rule]]
tool = "Bash"
pattern = "^Bash (echo|printf|export|set)"
category = "SHELL_STATE"

# Filesystem operations
[[rule]]
tool = "Bash"
pattern = "^Bash (mktemp|mkdir|mv|cp|rm)"
category = "FS_OP"

# Go toolchain (testing, compilation, linting, vendoring)
[[rule]]
pattern = "^(go|Bash) (test|vet|build|mod|get|fmt|generate|install|run)"
category = "GO_EXEC"

# Git
[[rule]]
tool = "Bash"
pattern = "^Bash (git|gh)"
category = "GIT"

# Generic test runners (pytest, npm test, cargo test, etc.)
[[rule]]
pattern = "^(Bash|Shell) (pytest|npm test|cargo test|./test|make test)"
category = "TEST_EXEC"

# Package managers (npm, pip, cargo, go mod, brew)
[[rule]]
pattern = "^(Bash|npm|pip|cargo|Homebrew) (install|add|remove|update|publish)"
category = "PKG"

# File read operations
[[rule]]
tool = "Read"
category = "FILE_READ"

[[rule]]
tool = "Glob"
category = "FILE_READ"

[[rule]]
tool = "Grep"
category = "FILE_READ"

# File write operations
[[rule]]
tool = "Edit"
category = "FILE_WRITE"

[[rule]]
tool = "Write"
category = "FILE_WRITE"

# Catch-all for remaining Bash
[[rule]]
pattern = "^Bash"
category = "SHELL_OTHER"
