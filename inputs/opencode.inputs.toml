# Shipped OpenCode input preset.
# Backscroll does not read files from this repository inputs/ directory at runtime;
# copy this file into <config_dir>/backscroll/inputs/ (or set BACKSCROLL_CONFIG_DIR)
# and edit as needed.
#
# Installation:
#   cp inputs/opencode.inputs.toml ~/.config/backscroll/inputs/
#   backscroll sync
version = 1

[[inputs]]
id = "opencode"
source = "session"
active = true

[inputs.discover]
roots = ["~/.local/share/opencode"]
include = ["opencode.db"]

[inputs.decode]
format = "opencode"
