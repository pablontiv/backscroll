# Shipped Pi input preset.
# Backscroll does not read files from this repository inputs/ directory at runtime;
# copy this file into <config_dir>/backscroll/inputs/ (or set BACKSCROLL_CONFIG_DIR)
# and edit as needed.
version = 1

[[inputs]]
id = "pi"
source = "session"
active = true

[inputs.discover]
roots = ["~/.pi/agent/sessions"]
include = ["**/*.jsonl"]
exclude = []
follow_symlinks = false

[inputs.decode]
format = "jsonl"

[inputs.record]
selector = "$"
include_when = [
  { selector = "$.type", op = "eq", value = "message" },
  { selector = "$.message.role", op = "in", value = ["user", "assistant"] },
]

[inputs.map]
role = "$.message.role"
uuid = "$.id"
timestamp = "$.timestamp"

[inputs.content]
selector = "$.message.content"
string = "$"
blocks = "$.message.content[*]"
block_text = "$.text"
content_type = "$.type"
include_when = [
  { selector = "$.type", op = "eq", value = "text" },
]
default_content_type = "text"

[inputs.text]
join = "\n"
trim = true
drop_empty = true
